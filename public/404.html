<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirect</title>
    <script>
      const path = window.location.pathname;
      const pathWithoutBase = path.replace(/^\/prevenindocomarte/, '') || '/';
      sessionStorage.redirect = pathWithoutBase;
      window.location.href = '/prevenindocomarte/';
    </script>
  </head>
  <body></body>
</html>
